<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>SEQ2 server</title>
      <h3> SEQ2 server</h3>
      Access to the Server
    <hr>
  </head>
  <body>
    <form action="ping" method="get">
    Is the server alive?
        <input type="submit" value="PING">
    </form>
    <hr>
    Get a Sequence. Select sequence number
        <select name="operation">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
            <br>
                <input type="submit" value="GET"/>
    <hr>
    Get a Sequence. Select the name
        <select name="operation">
            <option value="U5">U5</option>
            <option value="ADA">ADA</option>
            <option value="FRAT1">FRAT1</option>
            <option value="RNU_269P">RNU_269P</option>
            <option value="FXN">FXN</option>
        </select>
            <br>
                <input type="submit" value="GENE"/>
    <hr>
    Write a sequence:
  <input type="text" name="msg">
    <br>
    Select operation
  <input type ="radio" name="Info" value="Info" checked> Info
    <input type="radio" name="Comp" value="Comp"> Comp
    <input type="radio" name="Rev" value="Rev"> Rev
    <br>
    Perform operation
  <input type="submit" value="OPERATE!"/>
  </body>
    </html>
